spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  application:
    name: data-collector

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway manda; Hibernate solo valida el esquema
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration   # carpeta de migraciones
    baseline-on-migrate: false          # ponlo true SOLO si adoptas una DB ya existente

security:
  token:
    jwt:
      # Usa una clave Base64 segura de >=32 bytes. EJEMPLO (cambia en prod):
      secret: ${JWT_SECRET_BASE64:dGhpc19pc19hX2xvbmdfc2VjcmV0X2tleV9iYXNlNjQ=}
      expiration-minutes: 60
