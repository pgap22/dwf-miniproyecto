spring:
  config:
    import: optional:file:.env[.properties]   # carga .env automáticamente
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}     # por defecto dev

  application:
    name: data-collector

  jpa:
    hibernate:
      ddl-auto: validate            # Flyway migra; Hibernate solo valida
    open-in-view: false
    properties:
      hibernate.format_sql: true
    show-sql: false                 # lo activamos en dev

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE:false}

logging:
  level:
    org.flywaydb: info
