spring:
  config:
    import: optional:file:.env[.properties]   # carga .env automáticamente
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}     # por defecto dev

  application:
    name: data-collector

  jpa:
    hibernate:
      ddl-auto: validate            # Flyway migra; Hibernate solo valida
    open-in-view: false
    properties:
      hibernate.format_sql: true
    show-sql: false                 # lo activamos en dev

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE:false}

logging:
  level:
    org.flywaydb: info

security:
  token:
    jwt:
      # Usa una clave Base64 segura de >=32 bytes. EJEMPLO (cambia en prod):
      secret: ${JWT_SECRET_BASE64:dGhpc19pc19hX2xvbmdfc2VjcmV0X2tleV9iYXNlNjQ=}
      expiration-minutes: 60

springdoc:
  api-docs:
    path: /api-docs               # por defecto: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /docs                   # por defecto: /swagger-ui/index.html
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha