spring:
  datasource:
    # Sugerencia: permite crear la DB en dev si no existe
    url: ${DB_URL:jdbc:mysql://localhost:3306/data_collector?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false

  flyway:
    # normalmente no necesitas estas, solo si alguna vez conectas a una DB ya existente sin metadata
    baseline-on-migrate: ${FLYWAY_BASELINE:false}
